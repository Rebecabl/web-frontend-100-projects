<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Animated FAQ Accordion</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>FAQ</h1>

    <div class="accordion">

      <div class="item">
        <button class="question">
          O que é JavaScript?
          <span>+</span>
        </button>
        <div class="answer">
          JavaScript é uma linguagem usada para criar interatividade em páginas web.
        </div>
      </div>

      <div class="item">
        <button class="question">
          O que é HTML?
          <span>+</span>
        </button>
        <div class="answer">
          HTML é a estrutura básica de qualquer página web.
        </div>
      </div>

      <div class="item">
        <button class="question">
          O que é CSS?
          <span>+</span>
        </button>
        <div class="answer">
          CSS é usado para estilizar e definir o visual das páginas.
        </div>
      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
