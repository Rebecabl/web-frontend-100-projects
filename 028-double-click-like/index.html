<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Double Click Like</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h1>Galeria Interativa</h1>
    <p>Dê duplo clique na imagem</p>

    <div class="image-box" id="img">
      <img src="imagem.jpg" alt="">
      <div class="heart" id="heart">❤</div>
    </div>

    <p class="likes">
      Likes: <span id="count">0</span>
    </p>
  </div>

  <script src="script.js"></script>
</body>

</html>
